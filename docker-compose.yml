version: "3.9"

services:
  trevyx:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"   # API
      - "3000:3000"   # Frontend
    environment:
      JWT_SECRET: "trevyx-docker-secret-at-least-32-bytes!!"
      VYX_ENV: "production"
      TREVYX_DB_PATH: "/data/trevyx.db"
    volumes:
      - trevyx-data:/data
    restart: unless-stopped

volumes:
  trevyx-data:
